version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     slop_user
      POSTGRES_PASSWORD: slop_pass
      POSTGRES_DB:       slop_db
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slop_user"]
      interval: 5s; timeout: 5s; retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s; timeout: 3s; retries: 5

  backend:
    build: { context: ./backend, dockerfile: Dockerfile }
    ports: ["8000:8000"]
    env_file: [./backend/.env]
    environment:
      DATABASE_URL: postgresql://slop_user:slop_pass@postgres:5432/slop_db
      REDIS_URL:    redis://redis:6379/0
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - ./backend:/app
      - ./ml:/app/ml
      - ml_models:/app/ml/saved_model
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: { context: ./backend, dockerfile: Dockerfile }
    command: celery -A app.workers.tasks.celery_app worker --loglevel=info --concurrency=2
    env_file: [./backend/.env]
    environment:
      DATABASE_URL: postgresql://slop_user:slop_pass@postgres:5432/slop_db
      REDIS_URL:    redis://redis:6379/0
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - ./backend:/app
      - ./ml:/app/ml
      - ml_models:/app/ml/saved_model

volumes:
  postgres_data:
  ml_models: